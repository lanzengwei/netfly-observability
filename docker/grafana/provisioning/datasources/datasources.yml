apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    uid: loki
    editable: false
    jsonData:
      derivedFields:
        - datasourceUid: loki
          matcherRegex: '"trace_id":"([a-f0-9]{32})"'
          name: TraceID
          url: '$${__value.raw}'
        - datasourceUid: loki
          matcherRegex: 'trace_id=([a-f0-9]{32})'
          name: TraceID
          url: '$${__value.raw}'
