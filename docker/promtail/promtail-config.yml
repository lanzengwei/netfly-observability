server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: comment-sys-service
    static_configs:
      - targets: [localhost]
        labels:
          job: comment-sys-service
          # 将宿主机日志目录挂载到 promtail 容器的 /var/log/app 后生效
          __path__: /var/log/app/observability.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            project: project
            service: service
            trace_id: trace_id
            channel: channel
      - labels:
          project:
          service:
          level:
          channel:
      - structured_metadata:
          trace_id:
